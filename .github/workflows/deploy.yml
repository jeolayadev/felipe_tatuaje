name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Margen amplio: la cola de Pages a veces tarda >10 min en procesar.
    timeout-minutes: 40
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Nombre único por intento: al re-ejecutar un run, GitHub conserva el
      # artefacto anterior y deploy-pages aborta si encuentra dos con el mismo
      # nombre ("Multiple artifacts named github-pages"). Con el sufijo
      # run_attempt cada intento publica su propio artefacto sin chocar.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}

      # GitHub limita la espera del deploy a 10 min (timeout mayor se recorta).
      # Cuando la cola de Pages esta lenta, un solo intento no alcanza: se
      # reintenta hasta 3 veces dentro del mismo run (~30 min de cobertura).
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          error_count: 30

      - name: Deploy to GitHub Pages (reintento 2)
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          error_count: 30

      - name: Deploy to GitHub Pages (reintento 3)
        id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          error_count: 30
